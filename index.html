<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>✦ Agent Flow Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#030712;color:#e2e8f0;font-family:'Courier New',monospace;overflow:hidden;}
  button{outline:none;font-family:'Courier New',monospace;}
  textarea,input{outline:none;font-family:'Courier New',monospace;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:#0a0f1e;}
  ::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useRef, useEffect } = React;

const NODES = {
  trigger:   { label: "Trigger",   color: "#10b981", bg: "#022c22", icon: "⚡" },
  agent:     { label: "AI Agent",  color: "#a78bfa", bg: "#1e0a4a", icon: "✦" },
  transform: { label: "Transform", color: "#fbbf24", bg: "#2d1b00", icon: "⚙" },
  condition: { label: "Condition", color: "#60a5fa", bg: "#0c1f3a", icon: "◇" },
  output:    { label: "Output",    color: "#f87171", bg: "#2d0a0a", icon: "◉" },
};

let uid = 10;

function App() {
  const [tab, setTab] = useState("canvas");
  const [nodes, setNodes] = useState([
    { id:"1", type:"trigger",   pos:{x:20, y:40},  cfg:{},                                                                          out:null, st:null },
    { id:"2", type:"agent",     pos:{x:20, y:170}, cfg:{sys:"You are a creative assistant.", msg:"{{input}} — reply poetically in 2 sentences."}, out:null, st:null },
    { id:"3", type:"output",    pos:{x:20, y:300}, cfg:{},                                                                          out:null, st:null },
  ]);
  const [edges, setEdges] = useState([
    { id:"e1", src:"1", tgt:"2" },
    { id:"e2", src:"2", tgt:"3" },
  ]);
  const [sel, setSel]     = useState(null);
  const [conn, setConn]   = useState(null);
  const [running, setRunning] = useState(false);
  const [logs, setLogs]   = useState([]);
  const [apiKey, setApiKey] = useState("");
  const [showKey, setShowKey] = useState(false);
  const dragRef = useRef(null);
  const selNode = nodes.find(n => n.id === sel);

  useEffect(() => {
    const saved = localStorage.getItem("agentflow_key");
    if (saved) setApiKey(saved);
  }, []);

  useEffect(() => {
    const move = e => {
      if (!dragRef.current) return;
      const { id, ox, oy } = dragRef.current;
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      setNodes(p => p.map(n => n.id === id ? { ...n, pos: { x: Math.max(0, cx-ox), y: Math.max(0, cy-oy) } } : n));
    };
    const up = () => { dragRef.current = null; };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
    window.addEventListener("touchmove", move, { passive: true });
    window.addEventListener("touchend", up);
    return () => {
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", up);
      window.removeEventListener("touchmove", move);
      window.removeEventListener("touchend", up);
    };
  }, []);

  const startDrag = (e, id) => {
    e.stopPropagation();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    const node = nodes.find(n => n.id === id);
    dragRef.current = { id, ox: cx - node.pos.x, oy: cy - node.pos.y };
    setSel(id);
  };

  const portClick = (type, id) => {
    if (type === "out") { setConn(id); return; }
    if (type === "in" && conn && conn !== id) {
      if (!edges.find(e => e.src === conn && e.tgt === id))
        setEdges(p => [...p, { id:`e${++uid}`, src:conn, tgt:id }]);
      setConn(null);
    }
  };

  const addNode = type => {
    const id = String(++uid);
    const cfg = type==="agent" ? {sys:"You are helpful.", msg:"{{input}}"} : type==="transform" ? {mode:"uppercase"} : type==="condition" ? {minLen:10} : {};
    setNodes(p => [...p, { id, type, pos:{x:40+Math.random()*160, y:60+Math.random()*220}, cfg, out:null, st:null }]);
  };

  const delNode = () => {
    setNodes(p => p.filter(n => n.id !== sel));
    setEdges(p => p.filter(e => e.src !== sel && e.tgt !== sel));
    setSel(null);
  };

  const setCfg = (k, v) => setNodes(p => p.map(n => n.id === sel ? { ...n, cfg:{...n.cfg, [k]:v} } : n));

  const addLog = (msg, t="info") => setLogs(p => [...p, { msg, t, time: new Date().toLocaleTimeString() }]);

  const run = async () => {
    if (!apiKey) { setShowKey(true); addLog("⚠ Enter your API key first!", "err"); setTab("logs"); return; }
    setRunning(true); setLogs([]); setTab("logs");
    setNodes(p => p.map(n => ({ ...n, st:null, out:null })));
    const snap = [...nodes];
    const trigger = snap.find(n => n.type === "trigger");
    if (!trigger) { addLog("No trigger node!", "err"); setRunning(false); return; }

    const order=[], seen=new Set(), q=[trigger.id];
    while (q.length) {
      const id = q.shift();
      if (seen.has(id)) continue;
      seen.add(id); order.push(id);
      edges.filter(e => e.src===id).forEach(e => q.push(e.tgt));
    }

    addLog(`▶ Running ${order.length} nodes…`);
    const outs = {};

    for (const nid of order) {
      const node = snap.find(n => n.id === nid); if (!node) continue;
      setNodes(p => p.map(n => n.id===nid ? {...n, st:"run"} : n));
      addLog(`→ ${NODES[node.type].label}`);
      try {
        const prev = edges.filter(e => e.tgt===nid).map(e => outs[e.src]||"").join("\n");
        let result = "";
        if (node.type==="trigger") {
          result = "Workflow started"; addLog("Trigger fired ✓","ok");
        } else if (node.type==="agent") {
          addLog("Calling Claude API…");
          const userMsg = (node.cfg.msg||"{{input}}").replace("{{input}}", prev);
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST",
            headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
            body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:600, system:node.cfg.sys||"You are helpful.", messages:[{role:"user",content:userMsg}] }),
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error.message);
          result = data.content?.[0]?.text || "(no response)";
          addLog(`Claude replied · ${result.length} chars ✓`,"ok");
        } else if (node.type==="transform") {
          result = node.cfg.mode==="uppercase" ? prev.toUpperCase() : node.cfg.mode==="lowercase" ? prev.toLowerCase() : prev.trim();
          addLog("Transformed ✓","ok");
        } else if (node.type==="condition") {
          const pass = prev.length > (parseInt(node.cfg.minLen)||10);
          result = pass ? "PASS: "+prev : "FAIL: too short";
          addLog(`Condition: ${pass?"passed ✓":"failed ✕"}`, pass?"ok":"err");
        } else if (node.type==="output") {
          result = prev||"(empty)"; addLog("Output captured ✓","ok");
        }
        outs[nid] = result;
        setNodes(p => p.map(n => n.id===nid ? {...n, st:"done", out:result} : n));
        await new Promise(r => setTimeout(r,350));
      } catch(err) {
        addLog(`Error: ${err.message}`,"err");
        setNodes(p => p.map(n => n.id===nid ? {...n, st:"err"} : n));
      }
    }
    addLog("✅ Workflow complete!","ok");
    setRunning(false);
  };

  const NW = 210;

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#030712",color:"#e2e8f0",overflow:"hidden"}}>

      {/* Header */}
      <div style={{padding:"10px 14px",borderBottom:"1px solid #111827",display:"flex",alignItems:"center",gap:8,background:"#0a0f1e",flexShrink:0}}>
        <span style={{color:"#a78bfa",fontWeight:800,fontSize:14,letterSpacing:2}}>✦ AGENT FLOW</span>
        <div style={{flex:1}}/>
        <button onClick={()=>setShowKey(!showKey)} style={{background:"#0f172a",color:"#60a5fa",border:"1px solid #1e3a5f",borderRadius:6,padding:"6px 10px",fontSize:10,cursor:"pointer",marginRight:4}}>
          🔑 API Key
        </button>
        <button onClick={run} disabled={running} style={{
          background:running?"#052e16":"#10b981",color:running?"#4ade80":"#022c22",
          border:"none",borderRadius:8,padding:"8px 16px",fontWeight:700,fontSize:12,cursor:running?"not-allowed":"pointer"
        }}>{running?"◉ Running…":"▶ Run"}</button>
      </div>

      {/* API Key Input */}
      {showKey && (
        <div style={{background:"#0a0f1e",borderBottom:"1px solid #1e3a5f",padding:"10px 14px",display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
          <span style={{color:"#60a5fa",fontSize:10,flexShrink:0}}>Anthropic API Key:</span>
          <input type="password" value={apiKey} onChange={e=>{setApiKey(e.target.value);localStorage.setItem("agentflow_key",e.target.value);}}
            placeholder="sk-ant-..."
            style={{flex:1,background:"#040a14",border:"1px solid #1e3a5f",borderRadius:6,color:"#e2e8f0",padding:"6px 10px",fontSize:11}}/>
          <button onClick={()=>setShowKey(false)} style={{background:"#10b981",color:"#022c22",border:"none",borderRadius:6,padding:"6px 10px",fontSize:10,cursor:"pointer",fontWeight:700}}>Save</button>
        </div>
      )}

      {/* Tabs */}
      <div style={{display:"flex",background:"#0a0f1e",borderBottom:"1px solid #111827",flexShrink:0}}>
        {["canvas","config","logs"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{
            flex:1,padding:"9px 0",background:"transparent",border:"none",
            borderBottom:`2px solid ${tab===t?"#a78bfa":"transparent"}`,
            color:tab===t?"#a78bfa":"#4b5563",fontSize:10,letterSpacing:2,textTransform:"uppercase",cursor:"pointer"
          }}>
            {t==="config"?"⚙ Config":t==="canvas"?"◈ Canvas":`▤ Logs${logs.length?` (${logs.length})`:""}`}
          </button>
        ))}
      </div>

      {/* CANVAS */}
      {tab==="canvas" && (
        <div style={{flex:1,position:"relative",overflow:"hidden"}}>
          <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",opacity:.25}}>
            <defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx=".5" cy=".5" r=".5" fill="#1e293b"/></pattern></defs>
            <rect width="100%" height="100%" fill="url(#g)"/>
          </svg>
          <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"}}>
            {edges.map(e=>{
              const s=nodes.find(n=>n.id===e.src), t=nodes.find(n=>n.id===e.tgt);
              if(!s||!t) return null;
              const x1=s.pos.x+NW, y1=s.pos.y+44, x2=t.pos.x, y2=t.pos.y+44, cx=(x1+x2)/2;
              const col=NODES[s.type]?.color||"#334155";
              return (
                <g key={e.id}>
                  <path d={`M${x1} ${y1} C${cx} ${y1},${cx} ${y2},${x2} ${y2}`} stroke="#0f172a" strokeWidth={5} fill="none"/>
                  <path d={`M${x1} ${y1} C${cx} ${y1},${cx} ${y2},${x2} ${y2}`} stroke={col} strokeWidth={1.5} fill="none" opacity={.8}/>
                </g>
              );
            })}
          </svg>
          <div style={{position:"absolute",inset:0,overflow:"auto"}} onClick={()=>{setSel(null);setConn(null);}}>
            <div style={{position:"relative",minWidth:750,minHeight:520}}>
              {nodes.map(node=>{
                const def=NODES[node.type];
                return (
                  <div key={node.id}
                    onMouseDown={e=>startDrag(e,node.id)}
                    onTouchStart={e=>startDrag(e,node.id)}
                    onClick={e=>{e.stopPropagation();setSel(node.id);setTab("config");}}
                    style={{
                      position:"absolute",left:node.pos.x,top:node.pos.y,width:NW,
                      background:"#080f1e",borderRadius:12,cursor:"grab",userSelect:"none",
                      border:`2px solid ${sel===node.id?def.color:"#1e293b"}`,
                      boxShadow:sel===node.id?`0 0 20px ${def.color}44`:"0 4px 16px #00000088",
                      zIndex:sel===node.id?10:1,
                    }}>
                    <div style={{background:def.bg,borderRadius:"10px 10px 0 0",padding:"8px 12px",display:"flex",alignItems:"center",gap:8,borderBottom:`1px solid ${def.color}33`}}>
                      <span style={{fontSize:14}}>{def.icon}</span>
                      <span style={{color:def.color,fontWeight:700,fontSize:10,letterSpacing:1.5,textTransform:"uppercase"}}>{def.label}</span>
                      <div style={{marginLeft:"auto"}}>
                        {node.st==="run"  && <div style={{width:8,height:8,borderRadius:"50%",background:def.color,animation:"pulse 1s infinite"}}/>}
                        {node.st==="done" && <span style={{color:"#22c55e",fontSize:13}}>✓</span>}
                        {node.st==="err"  && <span style={{color:"#ef4444",fontSize:13}}>✕</span>}
                      </div>
                    </div>
                    <div style={{padding:"7px 12px",fontSize:10,color:"#4b5563",minHeight:28}}>
                      {node.type==="agent"     && <span style={{color:"#c4b5fd"}}>{node.cfg.sys?.slice(0,36)||"tap to configure"}</span>}
                      {node.type==="trigger"   && <span style={{color:"#6ee7b7"}}>Click ▶ Run to start</span>}
                      {node.type==="transform" && <span style={{color:"#fcd34d"}}>{node.cfg.mode||"uppercase"}</span>}
                      {node.type==="condition" && <span style={{color:"#93c5fd"}}>if length {">"} {node.cfg.minLen||10}</span>}
                      {node.type==="output"    && <span style={{color:"#fca5a5"}}>{node.out?node.out.slice(0,40)+"…":"awaiting…"}</span>}
                    </div>
                    {node.type!=="trigger" && (
                      <div onClick={e=>{e.stopPropagation();portClick("in",node.id);}}
                        style={{position:"absolute",left:-10,top:"50%",transform:"translateY(-50%)",width:18,height:18,borderRadius:"50%",cursor:"crosshair",zIndex:20,
                          background:conn?"#22c55e":"#0f172a",border:`2px solid ${conn?"#22c55e":"#334155"}`}}/>
                    )}
                    {node.type!=="output" && (
                      <div onClick={e=>{e.stopPropagation();portClick("out",node.id);}}
                        style={{position:"absolute",right:-10,top:"50%",transform:"translateY(-50%)",width:18,height:18,borderRadius:"50%",cursor:"crosshair",zIndex:20,
                          background:conn===node.id?def.color:"#0f172a",border:`2px solid ${conn===node.id?def.color:"#334155"}`}}/>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{position:"absolute",bottom:0,left:0,right:0,background:"#0a0f1eee",borderTop:"1px solid #111827",padding:"8px 10px",display:"flex",gap:6,flexWrap:"wrap"}}>
            {Object.entries(NODES).map(([type,def])=>(
              <button key={type} onClick={()=>addNode(type)} style={{
                background:def.bg,border:`1px solid ${def.color}55`,borderRadius:16,
                padding:"5px 10px",color:def.color,fontSize:10,cursor:"pointer"
              }}>{def.icon} {def.label}</button>
            ))}
          </div>
          {conn && <div style={{position:"absolute",top:10,left:"50%",transform:"translateX(-50%)",background:"#0a0f1e",border:"1px solid #a78bfa",borderRadius:8,padding:"5px 14px",fontSize:10,color:"#c4b5fd",pointerEvents:"none"}}>Tap input port to connect ✦</div>}
        </div>
      )}

      {/* CONFIG */}
      {tab==="config" && (
        <div style={{flex:1,overflow:"auto",padding:16}}>
          {!selNode
            ? <div style={{color:"#374151",textAlign:"center",marginTop:60,fontSize:12}}>← Tap a node in Canvas to configure</div>
            : <>
              <div style={{color:NODES[selNode.type].color,fontSize:11,letterSpacing:2,textTransform:"uppercase",marginBottom:16,paddingBottom:10,borderBottom:"1px solid #111827"}}>
                {NODES[selNode.type].icon} {NODES[selNode.type].label}
              </div>
              {selNode.type==="agent" && <>
                <div style={{color:"#6b7280",fontSize:9,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>System Prompt</div>
                <textarea value={selNode.cfg.sys||""} onChange={e=>setCfg("sys",e.target.value)}
                  style={{width:"100%",height:90,background:"#040a14",border:"1px solid #1f2937",borderRadius:8,color:"#e2e8f0",padding:10,fontSize:12,resize:"vertical",boxSizing:"border-box"}}/>
                <div style={{color:"#6b7280",fontSize:9,letterSpacing:2,textTransform:"uppercase",marginBottom:4,marginTop:12}}>User Message</div>
                <textarea value={selNode.cfg.msg||""} onChange={e=>setCfg("msg",e.target.value)}
                  style={{width:"100%",height:75,background:"#040a14",border:"1px solid #1f2937",borderRadius:8,color:"#e2e8f0",padding:10,fontSize:12,resize:"vertical",boxSizing:"border-box"}}/>
                <div style={{color:"#374151",fontSize:10,marginTop:4}}>Use {"{{input}}"} for previous node output</div>
              </>}
              {selNode.type==="transform" && <>
                <div style={{color:"#6b7280",fontSize:9,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Mode</div>
                {["uppercase","lowercase","trim"].map(m=>(
                  <button key={m} onClick={()=>setCfg("mode",m)} style={{
                    display:"block",width:"100%",marginBottom:6,padding:"10px",
                    background:selNode.cfg.mode===m?"#2d1b00":"#040a14",
                    border:`1px solid ${selNode.cfg.mode===m?"#fbbf24":"#1f2937"}`,
                    borderRadius:8,color:selNode.cfg.mode===m?"#fbbf24":"#6b7280",
                    cursor:"pointer",textAlign:"left",fontSize:12
                  }}>{m}</button>
                ))}
              </>}
              {selNode.type==="condition" && <>
                <div style={{color:"#6b7280",fontSize:9,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>Min Length</div>
                <input type="number" value={selNode.cfg.minLen||10} onChange={e=>setCfg("minLen",e.target.value)}
                  style={{width:"100%",background:"#040a14",border:"1px solid #1f2937",borderRadius:8,color:"#e2e8f0",padding:"9px",fontSize:12,boxSizing:"border-box"}}/>
              </>}
              {selNode.out && <>
                <div style={{color:"#6b7280",fontSize:9,letterSpacing:2,textTransform:"uppercase",marginTop:20,marginBottom:6}}>Last Output</div>
                <div style={{background:"#040a14",border:"1px solid #1f2937",borderRadius:8,padding:10,fontSize:11,color:"#94a3b8",maxHeight:180,overflow:"auto",whiteSpace:"pre-wrap",lineHeight:1.7}}>
                  {selNode.out}
                </div>
              </>}
              <button onClick={delNode} style={{marginTop:22,background:"#1c0808",color:"#f87171",border:"1px solid #7f1d1d",borderRadius:8,padding:"9px 16px",cursor:"pointer",fontSize:11}}>
                ⊗ Delete Node
              </button>
            </>
          }
        </div>
      )}

      {/* LOGS */}
      {tab==="logs" && (
        <div style={{flex:1,overflow:"auto",padding:14}}>
          {logs.length===0
            ? <div style={{color:"#374151",textAlign:"center",marginTop:60,fontSize:12}}>Press ▶ Run to see logs</div>
            : logs.map((l,i)=>(
              <div key={i} style={{display:"flex",gap:10,padding:"3px 0",fontSize:11,color:l.t==="err"?"#f87171":l.t==="ok"?"#4ade80":"#6b7280"}}>
                <span style={{color:"#1f2937",fontSize:9,flexShrink:0}}>{l.time}</span>
                <span>{l.msg}</span>
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
